name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: 'false'
        type: boolean
      release_tag:
        description: 'Attach embedded zip to an existing release (tag name, e.g. 0.9.1). Leave blank to skip artefact attach.'
        required: false
        default: ''
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` is required to mint the OIDC token that npm
      # trusted publishing exchanges for a short-lived publish credential.
      # Without it the `npm publish` step would fall back to looking for
      # NODE_AUTH_TOKEN and fail.
      # `contents: write` lets the "Attach embedded web bundle" step
      # upload the dongle artefact to the GitHub Release.
      contents: write
      id-token: write
    steps:
      # For a release trigger checkout defaults to that tag's ref.
      # For a manual `workflow_dispatch` with `release_tag` set, we
      # want to build the embedded bundle from THAT tag (not from
      # `main`) so the zip matches what shipped. Passing an empty
      # `ref` falls back to the default branch, which is what a
      # regular `workflow_dispatch` (dry-run tests, etc.) wants.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Pin the registry so the OIDC handshake targets npmjs.org.
          # Each package may still override via `publishConfig.registry`,
          # but ours all use the default (set to `access: public` only).
          registry-url: 'https://registry.npmjs.org'

      # Node 22 ships with npm 10; npm trusted publishing (the OIDC ↔
      # npmjs.org flow) requires npm >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # pnpm `publish -r` walks the workspace, skips private packages
      # (the monorepo root + `apps/web` are `"private": true`), and
      # forwards to `npm publish` per package. `--provenance` attaches a
      # verifiable build attestation — free when publishing via trusted
      # publishing.
      #
      # `continue-on-error: true` — npm publish is best-effort. If it
      # fails (registry hiccup, OIDC handshake glitch, a specific
      # package already published at this version, …) we don't want it
      # to gate the embedded-zip upload that dongle packagers depend
      # on. The step still shows as failed in the workflow UI so we
      # notice and can retry with `workflow_dispatch`; the job continues
      # on to the artefact-upload steps below.
      - name: Publish packages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: pnpm -r publish --provenance --no-git-checks

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: pnpm -r publish --provenance --no-git-checks --dry-run

      # Dongle-hosted variant of the web SPA (mounted at `/ncsx/` on
      # the Bimmerz Box). Not published to npm — packagers grab it
      # from the GitHub Release and drop it under `/sdcard/apps/ncsx/`.
      # See apps/web/README.md#embedded-build-dongle-hosted.
      #
      # Runs when either
      #   (a) a `release` event fired, or
      #   (b) `workflow_dispatch` was invoked with a non-empty
      #       `release_tag` — the "attach the zip to an existing
      #       release" path (useful when a prior publish workflow
      #       failed before it got here and can't be safely rerun,
      #       because rerun uses the workflow definition from the
      #       triggering commit).
      - name: Build embedded web bundle
        if: ${{ github.event_name == 'release' || github.event.inputs.release_tag != '' }}
        run: pnpm --filter @emdzej/ncsx-web build:embedded

      # Zip with a versioned name so multiple releases coexist on the
      # same download page. On `release` events `GITHUB_REF_NAME` is
      # the tag; on manual dispatches we take the tag from the input.
      - name: Package embedded web bundle
        if: ${{ github.event_name == 'release' || github.event.inputs.release_tag != '' }}
        id: package-embedded
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          version="${tag#v}"
          artifact="ncsx-web-embedded-${version}.zip"
          (cd apps/web/dist-embedded && zip -r "../../../${artifact}" .)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Attach embedded web bundle to release
        if: ${{ github.event_name == 'release' || github.event.inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.package-embedded.outputs.tag }}" "${{ steps.package-embedded.outputs.artifact }}" --clobber
